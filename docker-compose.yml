services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    user: 1000:1000
    ports:
      - 8096:8096/tcp
      - 7359:7359/udp
      # fix for traefik? 
    volumes:
      - ./config:/config
      - ./cache:/cache # or ram disk?
      - /mnt/public/:/media/public:ro
      - /mnt/tyler:/media/tyler:ro

  jellystat-db:
    image: 'postgres:15.2'
    shm_size: 1gb
    container_name: jellystat-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mypassword
      # move to env file
    volumes:
      - ./postgres-data:/var/lib/postgresql/data

  jellystat:
    image: 'cyfershepard/jellystat:latest'
    container_name: jellystat
    restart: unless-stopped
    environment:
      # move to env file
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mypassword
      POSTGRES_IP: jellystat-db
      POSTGRES_PORT: 5432
      JWT_SECRET: my-secret-jwt-key
      TZ: mytimezone
    volumes:
      - ./jellystat-backup-data:/app/backend/backup-data
    ports:
      - '3000:3000' # traefik
    depends_on:
      - jellystat-db
    logging: 
      driver: json-file
      options:
        max-file: '5'
        max-size: 10m

networks:
  default:
    external: true
    name: frontend
