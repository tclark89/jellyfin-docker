services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    user: 1000:1000
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - 105 # from plex
      - 107 # from jellyin: render
      - 44  # from jellyfin: video
    ports:
      - 8096:8096/tcp
      - 7359:7359/udp
      # fix for traefik? Looks complicated but do-able
    volumes:
      - ./config:/config
      - ./cache:/cache # or ram disk?
      - /mnt/public/:/media/public:ro
      - /mnt/tyler:/media/tyler:ro

  jellystat-db:
    image: 'postgres:15.2'
    shm_size: 1gb
    container_name: jellystat-db
    restart: unless-stopped
    env_file:
      - jellyfin.env
    volumes:
      - ./postgres-data:/var/lib/postgresql/data

  jellystat:
    image: 'cyfershepard/jellystat:latest'
    container_name: jellystat
    restart: unless-stopped
    environment:
      TZ: America/Chicago
    env_file:
      - jellyfin.env
    volumes:
      - ./jellystat-backup-data:/app/backend/backup-data
    #ports:
    #  - '3000:3000' # traefik
    depends_on:
      - jellystat-db
    labels:
      - traefik.enable=true
      - traefik.http.routers.jellystat-https.rule=Host(`jellystat.tyler-clark.com`)
      - traefik.http.routers.jellystat-https.tls=true
      - traefik.http.routers.jellystat-https.tls.certresolver=cloudflare
      - traefik.http.services.jellystat-https.loadbalancer.server.port=3000
    logging: 
      driver: json-file
      options:
        max-file: '5'
        max-size: 10m

networks:
  default:
    external: true
    name: frontend
